<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Abhi Admin</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      const stopWords = new Set(['a', 'an', 'and', 'are', 'as', 'at', 'be', 'by', 'for', 'from', 'how', 'in', 'into', 'is', 'it', 'its', 'new', 'of', 'on', 'or', 'part', 'the', 'to', 'with', 'your']);
      const toWord = (word) => word.toLowerCase().replace(/['’]/g, '').replace(/[^a-z0-9]+/g, '').trim();
      const oneWordSlug = (title) => {
        const words = String(title || '').split(/\s+/).map(toWord).filter(Boolean);
        const unique = [...new Set(words)];
        return unique
          .filter((word) => word.length > 2 && !stopWords.has(word))
          .sort((a, b) => words.lastIndexOf(b) - words.lastIndexOf(a))[0] || toWord(words.at(-1) || 'post') || 'post';
      };

      CMS.registerEventListener({
        name: 'preSave',
        handler: ({ entry }) => {
          const data = entry.get('data');
          const slug = data.get('slug') || oneWordSlug(data.get('title'));
          return data.set('slug', slug);
        },
      });
    </script>
  </body>
</html>
