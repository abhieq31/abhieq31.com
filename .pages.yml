media:
  input: public/img
  output: /img

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{fields.title}.md"
    view:
      fields:
        - title
        - pubDatetime
        - draft
      sort:
        - pubDatetime
        - title
      default:
        sort: pubDatetime
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: pubDatetime
        label: Publish date & time
        type: date
        required: true
        options:
          time: true
      - name: description
        label: Short description (optional — shown in lists & previews)
        type: text
      - name: tags
        label: Tags
        type: string
        list: true
        default:
          - personal
      - name: featured
        label: Featured (pin to homepage)
        type: boolean
        default: false
      - name: draft
        label: Draft (hide until you're ready)
        type: boolean
        default: false
      - name: body
        label: Post
        type: rich-text
